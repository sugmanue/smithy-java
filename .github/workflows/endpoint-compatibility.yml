name: Endpoint Ruleset Compatibility

on:
  # Run daily at 3 AM UTC
  schedule:
    - cron: '0 3 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  endpoint-compatibility:
    runs-on: ubuntu-latest
    name: AWS Endpoint Ruleset Compatibility

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'corretto'

      - name: Cache compiled buildscripts
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-gradle-${{ hashFiles('buildSrc/**/*.kts') }}
          path: |
            ./buildSrc/build

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          gradle-home-cache-includes: |
            caches

      - name: Run endpoint ruleset compatibility tests
        run: |
          ./gradlew :client:client-rulesengine:integ -PawsModelsTests --tests "*.AwsEndpointRulesetTest" --stacktrace

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: endpoint-compatibility-report
          path: '**/build/reports/tests'
